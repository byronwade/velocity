name: check

# Fast gate on every PR/push: validate the desktop app's core (src/core.ts
# through the subset checker), src/app.native markup, and app.zon. No Zig
# needed — `native check` runs standalone from the npm-published CLI.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  native-check:
    name: native check --strict
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Native SDK CLI
        run: npm install -g @native-sdk/cli@0.5.1
        working-directory: .
      - name: Check core + markup + app.zon
        run: native check --strict
