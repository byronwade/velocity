name: check

# Fast gate on every PR/push: the web (desktop frontend) and marketing site build.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: build web + site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web (Tauri frontend)
        run: pnpm --filter web build
      - name: Build marketing site
        run: pnpm --filter site build
